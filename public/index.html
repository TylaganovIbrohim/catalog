  <title>Лидер</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

</head>
<body>
  <h1>Лидер</h1>
  <div id="products"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAsrcT84CP6nZq8YG2KWfcu6TCtQpQoNm0",
      authDomain: "catalog-app-1014f.firebaseapp.com",
      projectId: "catalog-app-1014f",
      storageBucket: "catalog-app-1014f.firebasestorage.app",
      messagingSenderId: "1047135603204",
      appId: "1:1047135603204:web:6c7ceeaed34f73154ac351",
      measurementId: "G-0LQQQ1TBYP"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const productsContainer = document.getElementById("products");

    function renderProduct(doc) {
      const data = doc.data();
      const productDiv = document.createElement("div");
      productDiv.classList.add("product");

      productDiv.innerHTML = `
        <img src="${data.image}" alt="${data.name}">
        <h3>${data.name}</h3>
        <div class="buttons">
          <button>${data.price} ₽</button>
          <button id="btn-${data.id}" onclick="copyId('${data.id}')">ID: ${data.id}</button>
        </div>
      `;

      productsContainer.appendChild(productDiv);
    }

    db.collection("products").onSnapshot(snapshot => {
      productsContainer.innerHTML = "";
      snapshot.forEach(doc => {
        renderProduct(doc);
      });
    });

    function copyId(id) {
      navigator.clipboard.writeText(id);
      const btn = document.getElementById("btn-" + id);
      if (btn) {
        btn.classList.add("green");
        setTimeout(() => btn.classList.remove("green"), 1000);
      }
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => console.log("Service Worker зарегистрирован"))
        .catch(err => console.error("Ошибка SW:", err));
    }
  </script>
</body>
</html>
